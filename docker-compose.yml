version: "3.9"

services:

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"

  task-service:
    build: ./task-service
    ports:
      - "8002:8002"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - task-service